name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          envs: API_KEY,GOOGLE_APPLICATION_CREDENTIALS,GEMINI_API_KEY,OPENAI_API_KEY,S3_VIDEO_BUCKET,AWS_REGION,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,YOUTUBE_DOWNLOADER_URL,YDX_API_URL,CLEANUP_AFTER_PROCESSING
          script: |
            cd ~/AI-generated-AD

            git fetch origin main
            ENV_CHANGED=$(git diff --name-only HEAD origin/main | grep -E "environment.yml|requirements.txt" || true)

            git pull origin main

            cat > .env << ENVEOF
            API_KEY=${API_KEY}
            GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}
            GEMINI_API_KEY=${GEMINI_API_KEY}
            OPENAI_API_KEY=${OPENAI_API_KEY}
            S3_VIDEO_BUCKET=${S3_VIDEO_BUCKET}
            AWS_REGION=${AWS_REGION}
            AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
            AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
            YOUTUBE_DOWNLOADER_URL=${YOUTUBE_DOWNLOADER_URL}
            YDX_API_URL=${YDX_API_URL}
            CLEANUP_AFTER_PROCESSING=${CLEANUP_AFTER_PROCESSING}
            ENVEOF

            source ~/miniconda3/etc/profile.d/conda.sh
            conda activate video_describe

            if [ ! -z "$ENV_CHANGED" ]; then
              echo "Changes detected in environment files. Updating..."
              conda env update -f environment.yml --prune
              pip install -r requirements.txt
            else
              echo "No environment changes. Skipping update."
            fi

            pkill -f "python server.py" || true
            sleep 2

            setsid nohup python server.py > server.log 2>&1 &
            sleep 5

            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "Server started successfully"
            else
              echo "ERROR: Server health check failed."
              tail -n 50 server.log
              exit 1
            fi
